<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Section — The HAFS Herald." />
  <title>Section • The HAFS Herald</title>
  <link rel="icon" href="/assets/logo.png" type="image/png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="site-header">
    <div class="topbar container">
      <div class="brand">
        <a class="logo" href="index.html" aria-label="The HAFS Herald home">
          <span class="logo-mark logo-mark--img"><img src="/assets/logo.png" alt="The HAFS Herald logo" /></span>
          <span class="logo-text">
            <span class="logo-title">The HAFS Herald</span>
            <span class="logo-subtitle">Discimus Scribendo</span>
          </span>
        </a>
      </div>

      <div class="topbar-right">
        <div class="masthead-meta" aria-label="Issue info">
          <span class="pill" id="todayPill">Loading date…</span>
          <span class="pill pill-muted" id="issuePill">Issue #—</span>
        </div>

        <button class="icon-btn" id="themeBtn" type="button" aria-label="Toggle dark mode" title="Toggle dark mode">
          <span aria-hidden="true">☾</span>
        </button>

        <button class="icon-btn mobile-only" id="menuBtn" type="button" aria-label="Open menu" title="Menu">
          <span aria-hidden="true">☰</span>
        </button>
      </div>
    </div>

    <nav class="nav container" id="siteNav" aria-label="Primary navigation">
      <a href="index.html" class="nav-link">Home</a>
      <a href="archive.html" class="nav-link">Archive</a>
      <a href="index.html#sections" class="nav-link">Sections</a>
      <a href="staff.html" class="nav-link">Staff</a>
      <a href="index.html#contact" class="nav-link">Contact</a>
      <div class="nav-spacer" aria-hidden="true"></div>
      <a href="/admin" class="nav-link nav-cta">Admin</a>
      </nav>
  </header>

  <main id="main" class="container">
    <section class="section">
      <div class="section-head">
        <h1 class="headline-lg" id="sectionTitle">Section</h1>
        <p class="muted" id="sectionQuote"></p>
      </div>

      <div class="archive-controls" aria-label="Section filters">
        <label class="field">
          <span class="field-label">Search</span>
          <input id="search" type="search" placeholder="Search title, author, summary…" autocomplete="off" />
        </label>

        <label class="field">
          <span class="field-label">Issue</span>
          <select id="issueSelect">
            <option value="all">All</option>
            <option value="current">Current issue</option>
          </select>
        </label>

        <label class="field">
          <span class="field-label">Year</span>
          <select id="yearSelect">
            <option value="all">All</option>
          </select>
        </label>

        <label class="field">
          <span class="field-label">Sort</span>
          <select id="sort">
            <option value="newest">Newest</option>
            <option value="oldest">Oldest</option>
            <option value="title">Title (A–Z)</option>
          </select>
        </label>
      </div>

      <div class="grid" id="grid" aria-live="polite"></div>

      <div class="empty-state" id="empty" hidden>
        <h3 class="headline-md">No matches.</h3>
        <p class="muted">Try a different search term or broaden filters.</p>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div>
        <div class="footer-title">The HAFS Herald</div>
        <div class="muted">© <span id="yearSpan"></span> Student Newspaper.</div>
      </div>
      <div class="footer-links">
        <a href="archive.html">Archive</a>
        <a href="staff.html">Staff</a>
        <a href="index.html">Home</a>
      </div>
    </div>
  </footer>

  <script src="./config.js"></script>
  <script type="module" src="section.js"></script>
</body>
</html>
